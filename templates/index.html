<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>AI House Price Predictor</title>

    <!-- Bootstrap -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <!-- CSS File -->

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="title">

                <div class="ai-badge">
                    AI Powered Prediction System
                </div>

                <h1>🏠 Smart House Price Predictor</h1>

                <p>
                    Predict Bangalore house prices instantly using Machine Learning
                </p>

            </div>

            <form method="post" id="prediction-form">

                <!-- Location -->

                <label>Select Location</label>

                <select class="form-control"
                    id="location"
                    name="location"
                    required>

                    {% for location in locations %}

                    <option value="{{ location }}">
                        {{ location }}
                    </option>

                    {% endfor %}

                </select>

                <!-- BHK -->

                <label>Enter BHK</label>

                <input type="number"
                    class="form-control"
                    id="bhk"
                    name="bhk"
                    placeholder="Example: 2"
                    required>

                <!-- Bathrooms -->

                <label>Bathrooms</label>

                <input type="number"
                    class="form-control"
                    id="bath"
                    name="bath"
                    placeholder="Example: 2"
                    required>

                <!-- SQFT -->

                <label>Total Square Feet</label>

                <input type="number"
                    class="form-control"
                    id="sqft"
                    name="sqft"
                    placeholder="Example: 1200"
                    required>

                <!-- Button -->

                <button type="button"
                    class="predict-btn"
                    onclick="send_data()">

                    🚀 Predict Price

                </button>

            </form>

            <!-- Result -->

            <div class="result-box">

                <h5>Predicted Price</h5>

                <h2>
                    <span id="prediction">
                        ₹ --
                    </span>
                </h2>

            </div>

        </div>

    </div>

    <script>

        function send_data(){

            var form = document.getElementById('prediction-form');

            var fd = new FormData(form);

            var xhr = new XMLHttpRequest();

            xhr.open('POST','/predict',true);

            document.getElementById("prediction").innerHTML =
            "Predicting...";

            xhr.onreadystatechange = function(){

                if(xhr.readyState == XMLHttpRequest.DONE){

                    document.getElementById("prediction").innerHTML =
                    "₹ " + xhr.responseText + " Lakhs";

                }

            }

            xhr.send(fd);

        }

    </script>

</body>

</html>
